services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-realtyscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realtyscope}
      POSTGRES_DB: ${POSTGRES_DB:-realtyscope}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  mlflow:
    build:
      context: services/mlflow
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: services/api
      dockerfile: Dockerfile
      additional_contexts:
        app_deps: docker/build/deps
        app_services: services
        app_src: src
    environment:
      APP_ENV: docker
      PROJECT_NAME: RealtyScope
      POSTGRES_HOST: db
      REDIS_HOST: redis
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - model_artifacts:/app/data/processed/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: services/streamlit
      dockerfile: Dockerfile
      additional_contexts:
        app_deps: docker/build/deps
        app_services: services
        app_src: src
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  trainer:
    profiles: ["tools"]
    build:
      context: services/trainer
      dockerfile: Dockerfile
      additional_contexts:
        app_deps: docker/build/deps
        app_src: src
    environment:
      APP_ENV: docker
      PROJECT_NAME: RealtyScope
      POSTGRES_HOST: db
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ACTIVE_MODEL_NAME: realtyscope-price-model
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - mlflow_data:/mlflow
      - model_artifacts:/app/data/processed/models

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  model_artifacts:
